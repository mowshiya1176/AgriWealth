{% extends 'base.html' %}
{% block title %}Edit Profile - AgriWealth{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-7">
      <div class="card p-4 p-md-5">
        <h4 class="section-title mb-4">Edit Profile</h4>
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          {% for field in form %}
          <div class="mb-3">
            <label class="form-label small fw-semibold">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div class="text-danger small">{{ field.errors.0 }}</div>{% endif %}
          </div>
          {% endfor %}
          <button type="submit" class="btn btn-primary w-100 rounded-pill">Save Changes</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
