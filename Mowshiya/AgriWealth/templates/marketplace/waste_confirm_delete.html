{% extends 'base.html' %}
{% block title %}Delete Listing{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card p-5 text-center">
        <div style="font-size:3rem;">&#9888;</div>
        <h4 class="mt-3">Delete Listing?</h4>
        <p class="text-muted">Are you sure you want to delete <strong>{{ item.title }}</strong>? This cannot be undone.</p>
        <form method="post" class="d-flex gap-3 justify-content-center mt-3">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger rounded-pill px-4">Yes, Delete</button>
          <a href="{% url 'marketplace:waste_detail' item.pk %}" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
